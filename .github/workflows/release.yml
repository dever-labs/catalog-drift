name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build cross-platform binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              # Windows uses .exe extension
              EXT=""
              [ "$GOOS" = "windows" ] && EXT=".exe"

              OUTPUT="dist/catalog-drift_${GOOS}_${GOARCH}${EXT}"
              echo "Building ${OUTPUT}"
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "$LDFLAGS" \
                -o "$OUTPUT" \
                ./cmd/catalog-drift

              # Package into tar.gz (zip for windows)
              if [ "$GOOS" = "windows" ]; then
                zip -j "dist/catalog-drift_${GOOS}_${GOARCH}.zip" "$OUTPUT"
              else
                tar -czf "dist/catalog-drift_${GOOS}_${GOARCH}.tar.gz" \
                  -C dist "catalog-drift_${GOOS}_${GOARCH}"
              fi
            done
          done

          # Generate checksums
          cd dist && sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
