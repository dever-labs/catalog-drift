name: 'catalog-drift'
description: 'API contract drift and deprecation detection against a Backstage catalog'
author: 'dever-labs'

branding:
  icon: 'activity'
  color: 'blue'

inputs:
  subcommand:
    description: |
      Subcommand to run:
        check      — diff local spec/code against the registered Backstage contract
        deprecated — scan source code for calls to deprecated APIs
        consumers  — list catalog components that consume a deprecated API
    required: false
    default: 'check'
  backstage-url:
    description: 'Backstage instance URL'
    required: true
  token:
    description: 'Backstage API Bearer token'
    required: false
    default: ''
  component:
    description: 'Component name in Backstage'
    required: false
    default: ''
  namespace:
    description: 'Backstage namespace'
    required: false
    default: 'default'
  source:
    description: |
      Source directory to scan.
        check: scans for local spec files; with scan-code=true also checks code routes vs Backstage
        deprecated: scans source code for calls to deprecated endpoints
    required: false
    default: ''
  format:
    description: 'Output format: text, json, junit'
    required: false
    default: 'text'
  error-after:
    description: 'Duration after deprecated-since before treating deprecation as an error (e.g. 90d)'
    required: false
    default: ''
  fail-on-warn:
    description: 'Exit 1 on warnings as well as errors'
    required: false
    default: 'false'
  scan-code:
    description: 'Scan code routes against Backstage contract and local spec (check subcommand)'
    required: false
    default: 'false'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/dever-labs/catalog-drift:latest'
  env:
    BACKSTAGE_TOKEN: ${{ inputs.token }}
  args:
    - ${{ inputs.subcommand }}
    - --backstage-url=${{ inputs.backstage-url }}
    - --format=${{ inputs.format }}
    - --component=${{ inputs.component }}
    - --namespace=${{ inputs.namespace }}
    - --source=${{ inputs.source }}
    - --error-after=${{ inputs.error-after }}
    - --fail-on-warn=${{ inputs.fail-on-warn }}
    - --scan-code=${{ inputs.scan-code }}
